concepts:[
{h:"Power BI Apps",p:`Apps = A packaged bundle of dashboards + reports published from a Workspace.

WHY APPS?
  • Workspace content can change (developers editing)
  • App provides a STABLE published version that viewers see
  • App version is updated only when you explicitly republish it
  • Viewers get the App link — they don't directly access the workspace

FLOW:
  Workspace (developers edit) → Publish App → Viewers use App (stable)

CREATE APP:
  Workspace → Create App
  → Add content (select reports & dashboards)
  → Configure audience (who can see which content)
  → Publish App`},
{h:"Subscriptions",p:`Subscriptions = Power BI emails you a report screenshot automatically.

SETUP:
  Open a Report → Subscribe to Report
  Set: Frequency (Daily/Weekly), Time, Specific Page
  
  Subscribers receive: Email with PNG screenshot of report + link

USE CASE: Every Monday 8 AM, send weekly sales summary to sales team.

LIMITATIONS:
  • Sends screenshot (static) not live interactive report
  • Maximum 24 subscribers per subscription
  • Only the report at the TIME of email is captured`},
{h:"Lineage View & Endorsement",p:`LINEAGE VIEW:
  Workspace → Lineage View
  Shows: Data Source → Dataset → Reports → Dashboards → Apps
  Visual map of how data flows through your Power BI content.
  Useful for impact analysis: "If I change this dataset, which reports break?"

ENDORSEMENT:
  Promoted  → Dataset/Report recommended by content creator
  Certified → Officially verified by organisation (requires admin approval)
  
  Certified datasets appear with ✓ badge in Power BI
  Other report builders should use Certified datasets — trusted, governed data`}
],

{day:23,week:4,title:"Data Refresh & Gateway",sub:"Import vs DirectQuery, On-Premises Gateway setup, Incremental Refresh",
objectives:["Compare Import, DirectQuery and Live Connection modes in depth","Install and configure On-Premises Data Gateway","Set up scheduled refresh for Excel and SQL data","Understand Incremental Refresh for large datasets","Troubleshoot common refresh failure scenarios"],
concepts:[
{h:"Connectivity Mode Deep Dive",p:`IMPORT MODE:
  ✓ Fastest query performance (in-memory VertiPaq)
  ✓ Works offline after loading
  ✓ Full DAX Time Intelligence support
  ✗ Data is as fresh as last refresh (up to 48/day with Premium)
  ✗ Model size limit (1GB Service free/Pro, 10GB+ Premium)

DIRECTQUERY MODE:
  ✓ Always real-time data (no refresh needed)
  ✓ No size limits — data stays in database
  ✗ Slower visuals (every click = SQL query to DB)
  ✗ Limited DAX functions
  ✗ Requires stable database connection

LIVE CONNECTION:
  ✓ Connects to SSAS, Azure AS, Power BI Dataset
  ✗ Cannot add custom tables or measures in Desktop
  ✗ No data model changes — read-only

COMPOSITE MODEL (Best of both):
  Some tables = DirectQuery (real-time fact data)
  Some tables = Import (slow-changing dimension data)`},
{h:"On-Premises Data Gateway",p:`PROBLEM: Power BI Service is in the CLOUD.
  Your SQL Server is on your LOCAL network / company server.
  Cloud cannot directly reach local network!

SOLUTION: Install the Gateway on a local PC/server.
  Gateway acts as a SECURE BRIDGE between cloud and local.

GATEWAY TYPES:
  Personal Mode       → One user only. For Excel/CSV files on your PC.
  Enterprise Mode     → Shared by multiple users/datasets. For SQL Server etc.

INSTALLATION:
  1. Download gateway from powerbi.microsoft.com
  2. Install on a machine that is ALWAYS ON (not a laptop you shut down)
  3. Sign in with Power BI account
  4. In Power BI Service: Settings → Manage Gateways → Add data source`},
{h:"Incremental Refresh",p:`Problem: Large datasets (10M+ rows) take too long to fully refresh every day.
Solution: Only refresh NEW and CHANGED rows.

SETUP (requires parameters named RangeStart and RangeEnd):
  1. In Power Query: create parameters RangeStart (Date/Time) and RangeEnd (Date/Time)
  2. Filter your data: OrderDate >= RangeStart AND OrderDate < RangeEnd
  3. In Power BI Desktop: right-click table → Incremental Refresh Policy
  4. Set: Store N years of data, Refresh last N days
  5. Publish to Premium workspace

Power BI automatically partitions and only refreshes recent data!`}
],
code:`// ═══ GATEWAY TROUBLESHOOTING ═══
// Common refresh errors and fixes:

// ERROR: "Data source credentials expired"
// FIX: Go to Dataset Settings → Data Source Credentials → Edit → Re-enter password

// ERROR: "Gateway offline"
// FIX: Open gateway machine, ensure service is running:
//   Windows Services → "On-premises data gateway service" → Start

// ERROR: "Unable to connect to SQL Server"
// FIX: Verify:
//   1. SQL Server name in connection string matches gateway data source
//   2. Firewall allows port 1433 (SQL Server default)
//   3. SQL Server Browser service is running

// ═══ INCREMENTAL REFRESH PARAMETERS ═══
// Must be EXACTLY named: RangeStart and RangeEnd
// Type: Date/Time (not Date)

// Power Query filter step:
#"Filtered Date Range" = Table.SelectRows(
  Source,
  each [OrderDate] >= RangeStart and [OrderDate] < RangeEnd
)

// ═══ REFRESH SCHEDULE (Power BI Service) ═══

// Timezone: Set your local timezone!

//   Pro license:     Up to 8 refreshes per day

{h:"What-If Parameters",p:`What-If Parameter = A numeric slicer that creates a MEASURE representing the selected value.

{day:25,week:4,title:"Performance Optimisation",sub:"VertiPaq engine, query folding, DAX best practices, Performance Analyzer",
objectives:["Understand how VertiPaq in-memory engine works","Use Performance Analyzer to identify slow visuals","Optimise DAX measures for faster calculation","Apply Power Query best practices for query folding","Reduce model size with column management techniques"],
concepts:[
{h:"How VertiPaq Works",p:`VertiPaq = Power BI's in-memory columnar database engine.

KEY CONCEPTS:
  COLUMNAR STORAGE: Data stored by column, not by row.
    Faster for aggregating one column (SUM, COUNT) across millions of rows.
  
  COMPRESSION: Repetitive values compress heavily.
    "North", "North", "North", "South", "North" → stored as [N3, S1, N1]
    Low cardinality (few unique values) = better compression.
  
  DICTIONARY ENCODING: Each unique value stored once; rows store index numbers.
    Products[Category] = 5 unique values → stored as numbers 1-5, not text.

IMPLICATION:
  → Remove unnecessary columns (they use memory even if not in visuals)
  → Reduce cardinality where possible (e.g., round timestamps to day level)
  → Avoid high-cardinality text columns in relationships`},
{h:"Query Folding (Power Query)",p:`Query Folding = Power Query pushes transformation steps back to the DATABASE as SQL.
  Instead of loading all data then filtering in Power Query,
  the filter becomes a WHERE clause in SQL — far faster!

CHECK: Right-click a step in Applied Steps → "View Native Query"
  → If you see SQL = Query folding is happening ✓
  → If option is greyed out = No query folding ✗

BEST PRACTICES:
  ✓ Apply filters (date range, rows) as EARLY as possible in steps
  ✓ Remove columns you don't need at SOURCE
  ✓ Avoid custom M functions that break folding
  ✗ Adding Index Column breaks query folding
  ✗ Using unpivot can break folding on some connectors`},
{h:"DAX Performance Best Practices",p:`SLOW (avoid):
  ✗ FILTER(ALL(Table), complex conditions) — scans entire table
  ✗ Using CALCULATE inside SUMX unnecessarily
  ✗ Many calculated columns that can be measures
  ✗ High-cardinality calculated columns (like formatted date text)
  ✗ Overusing RELATED inside iterators (causes many lookups)

FAST (prefer):
  ✓ Simple column filters in CALCULATE: [Region] = "North"
  ✓ Variables (VAR) to compute intermediate values once
  ✓ SUMX only when needed — use SUM for simple aggregation
  ✓ DIVIDE instead of / to avoid error handling overhead
  ✓ Remove unused measures from the model`}
],
code:`// ═══ PERFORMANCE ANALYZER ═══
// View → Performance Analyzer → Start Recording
// Then click on a visual to force it to reload
// See: DAX Query time, Visual Display time, Other time

// If DAX Query > 500ms → Optimise your DAX measure
// If Visual Display > 300ms → Simplify the visual (fewer data points)

// ═══ DAX OPTIMIZATION — USE VAR ═══

// SLOW (calculates [Total Sales] twice):
Growth % = 
  DIVIDE(
    [Total Sales] - CALCULATE([Total Sales], SAMEPERIODLASTYEAR(Date[Date])),
    CALCULATE([Total Sales], SAMEPERIODLASTYEAR(Date[Date]))
  )

// FAST (uses VAR — calculates last year only once):
Growth % = 
  VAR CurrentSales = [Total Sales]
  VAR LastYearSales = CALCULATE([Total Sales], SAMEPERIODLASTYEAR(Date[Date]))
  RETURN
    DIVIDE(CurrentSales - LastYearSales, LastYearSales)

// ═══ REDUCE MODEL SIZE ═══
// In Power Query, before loading:
// 1. Remove columns you never use
// 2. Change Decimal to Whole Number if no decimals needed
// 3. Round DateTime to Date only (remove time part):
//    Date Only = DATEVALUE(DateTime column)
// 4. Remove high-cardinality free-text columns (notes, comments)

// ═══ MODEL ANALYSER ═══
// External tools: DAX Studio or Tabular Editor (free download)
// Connect to Power BI model → analyse column sizes, measure performance
// DAX Studio: File → Connect → Power BI Desktop
// Run: SELECT * FROM $System.DISCOVER_STORAGE_TABLE_COLUMNS
// See which column takes most memory!`,
exercises:["Use Performance Analyzer: find your slowest visual. Optimise the DAX measure using VAR. Measure improvement.","In Power Query, filter date range as the FIRST step. Check 'View Native Query' to confirm query folding is active.","Audit your model: remove 5+ unnecessary columns. Check if model file size reduces significantly.","Rewrite a complex nested IF measure using SWITCH(TRUE()) and VAR. Compare execution time."],

{q:"VertiPaq performs BEST when columns have:",opts:["A) Many unique values (high cardinality)","B) Few unique values (low cardinality) ✓","C) Decimal numbers","D) Null values"],cor:"B"},
{q:"Query Folding means:",opts:["A) Collapsing Power Query steps","B) Power Query pushes transformations to the source database as SQL ✓","C) Folding the model into a smaller size","D) Reducing the number of visuals"],cor:"B"},

code:`// ═══ 28-DAY REVIEW — KEY DAX PATTERNS ═══

// 1. Basic Aggregation
Total Sales = SUM(Sales[Amount])

// 2. Safe Division
Margin % = DIVIDE(SUM(Sales[Profit]), SUM(Sales[Revenue]))

// 3. Year over Year
YoY Growth = DIVIDE([Total Sales] - [LY Sales], [LY Sales])
LY Sales = CALCULATE([Total Sales], SAMEPERIODLASTYEAR(Date[Date]))

// 4. YTD
Sales YTD = TOTALYTD([Total Sales], Date[Date])

// 5. % of Total
Sales % = DIVIDE([Total Sales], CALCULATE([Total Sales], ALL(Sales)))

// 6. Ranking
Product Rank = RANKX(ALL(Products), [Total Sales],, DESC, DENSE)

// 7. Top N
Top 5 Sales = CALCULATE([Total Sales], TOPN(5, Products, [Total Sales]))

// 8. Dynamic Title
Title = "Sales: " & SELECTEDVALUE(Date[Year], "All Years")

// 9. SWITCH Multi-Category
Tier = SWITCH(TRUE(),
  [Total Sales] > 100000, "Platinum",
  [Total Sales] > 50000,  "Gold",
  [Total Sales] > 10000,  "Silver",
  "Bronze")

// 10. SUMX Revenue from components
Revenue = SUMX(Sales, Sales[Qty] * Sales[UnitPrice] * (1-Sales[Discount]))

// 11. Conditional formatting measure (for matrix)
Heat Color = 
  IF([Sales % of Category] > 0.5, 3,
     IF([Sales % of Category] > 0.25, 2, 1))

// 12. RLS Dynamic Filter
[UserEmail] = USERPRINCIPALNAME()

// 13. Time comparison
MoM Growth % = DIVIDE([Total Sales] - [PM Sales], [PM Sales])
PM Sales = CALCULATE([Total Sales], DATEADD(Date[Date], -1, MONTH))

// 14. Error handling
Safe Calc = IFERROR([Complex Measure], BLANK())

// 15. VAR optimisation
Optimised Measure = 
  VAR Sales = [Total Sales]
  VAR Target = [Sales Target]
  VAR Diff = Sales - Target
  RETURN IF(ISBLANK(Target), "No Target", FORMAT(Diff/Target, "+0.0%;-0.0%"))`,

// RENDER ENGINE
// ─────────────────────────────────────
let current = 1;

const WEEK_META = [
  {label:"Week 1 — Foundations",        cls:"t1", dot:"#10B981"},
  {label:"Week 2 — Modelling & DAX",    cls:"t2", dot:"#3B82F6"},
  {label:"Week 3 — Advanced Features",  cls:"t3", dot:"#8B5CF6"},
  {label:"Week 4 — Expert & Deploy",    cls:"t4", dot:"#EF4444"},
];

function buildNav(){
  const nav = document.getElementById('sb-nav');
  nav.innerHTML='';
  WEEK_META.forEach((wm,wi)=>{
    const wdays = DAYS.filter(d=>d.week===wi+1);
    const grp = document.createElement('div');
    grp.innerHTML=`<div class="wk-label"><span class="wk-dot" style="background:${wm.dot}"></span><span style="color:${wm.dot}">${wm.label}</span></div>`;
    wdays.forEach(d=>{
      const btn = document.createElement('button');
      btn.className='day-btn'+(d.day===current?' act':'');
      btn.id='nav-d'+d.day;
      btn.textContent=`Day ${d.day} — ${d.title}`;
      btn.onclick=()=>goDay(d.day);
      grp.appendChild(btn);
    });
    nav.appendChild(grp);
  });
}

function goDay(n){
  current=n;
  document.querySelectorAll('.day-btn').forEach(b=>b.classList.remove('act'));
  const btn=document.getElementById('nav-d'+n);
  if(btn){btn.classList.add('act'); btn.scrollIntoView({block:'nearest'});}
  const d=DAYS.find(x=>x.day===n);
  const pct=Math.round((n/28)*100);
  document.getElementById('pb').style.width=pct+'%';
  render(d);
  document.getElementById('main').scrollTop=0;
}

function render(d){
  const wm=WEEK_META[d.week-1];
  let html=`
  <div class="d-head">
    <div class="d-tag ${wm.cls}">📅 Week ${d.week} · Day ${d.day} of 28</div>
    <div class="d-num">Day ${d.day}</div>
    <div class="d-title">${d.title}</div>
    <div class="d-sub">${d.sub}</div>
  </div>

  <div class="card">
    <div class="card-title"><span>🎯</span> Learning Objectives</div>
    <ul class="obj-list">
      ${d.objectives.map(o=>`<li>${o}</li>`).join('')}
    </ul>
  </div>

  <div class="card">
    <div class="card-title"><span>📖</span> Concepts & Theory</div>
    ${d.concepts.map(c=>`
      <div class="con">
        <h4>▶ ${c.h}</h4>
        <p>${c.p}</p>
      </div>
    `).join('')}
  </div>

  <div class="card">
    <div class="card-title"><span>💻</span> Code Examples & Syntax</div>
    <pre>${escHtml(d.code)}</pre>
  </div>

  <div class="card">
    <div class="card-title"><span>🔬</span> Hands-On Exercises</div>
    ${d.exercises.map((e,i)=>`
      <div class="ex-item">
        <span class="ex-num">Ex ${i+1}</span>
        <p>${e}</p>
      </div>
    `).join('')}
  </div>

  <div class="card">
    <div class="card-title"><span>📝</span> Quick Quiz (MCQ)</div>
    ${d.quiz.map((q,i)=>`
      <div class="quiz-item">
        <div class="quiz-q">Q${i+1}. ${q.q}</div>
        <ul class="quiz-opts">
          ${q.opts.map(o=>`<li class="${o.includes('✓')?'cor':''}">${o.replace(' ✓','')}</li>`).join('')}
        </ul>
        <div style="font-size:12px;color:#3fb950;margin-top:6px">✓ Answer: Option ${q.cor}</div>
      </div>
    `).join('')}
  </div>

  <div class="card">
    <div class="card-title"><span>💡</span> Teacher Tips & Notes</div>
    ${d.tips.map(t=>`<div class="tip">${t}</div>`).join('')}
  </div>

  <div class="nav-row">
    ${d.day>1 ? `<button class="nav-b" onclick="goDay(${d.day-1})">← Day ${d.day-1}</button>` : ''}
    <button class="nav-b" onclick="window.print()">🖨️ Print This Day</button>
    ${d.day<28 ? `<button class="nav-b pri" onclick="goDay(${d.day+1})">Day ${d.day+1} →</button>` : '<span style="color:var(--acc);font-weight:700;padding:10px 0">🏆 Congratulations! All 28 Days Complete!</span>'}
  </div>
  `;
  document.getElementById('day-content').innerHTML=html;
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function filterNav(q){
  const v=q.toLowerCase();
  document.querySelectorAll('.day-btn').forEach(b=>{
    b.style.display=b.textContent.toLowerCase().includes(v)?'':'none';
  });
}

// INIT
buildNav();
goDay(1);
</script>
