overview:"A deeper GCP session, connecting Compute Engine and Cloud Storage to BigQuery — showcasing GCP's distinct strength in data analytics that AWS and Azure don't match as directly.",
topics:[
 {t:"GCP project and IAM structure", d:"Projects are the core billing/permission boundary; GCP IAM uses Roles (collections of permissions) assigned to Members (users, groups, service accounts) — conceptually similar to AWS IAM but with different terminology."},
 {t:"Compute Engine sizing", d:"Machine types (e2, n2, c2 series) map to general-purpose, balanced, or compute-optimized workloads, directly analogous to AWS's t/m/c instance families."},
 {t:"Cloud Storage classes", d:"Standard, Nearline (monthly access), Coldline (quarterly access), and Archive (yearly access) — GCP's equivalent ladder to S3's storage classes, optimized around minimum storage duration."},
 {t:"BigQuery for analytics", d:"A fully serverless data warehouse — you load data and run SQL queries directly, with GCP automatically managing all underlying compute and storage scaling."}
],
terms:[
 {term:"Service Account", def:"A non-human identity in GCP used by applications or VMs to authenticate and access resources."},
 {term:"Nearline/Coldline/Archive", def:"GCP's tiered storage classes for progressively less-frequently accessed data."},
 {term:"BigQuery dataset", def:"A top-level container for organizing tables within BigQuery."},
 {term:"Serverless data warehouse", def:"A data warehouse (like BigQuery) requiring no manual infrastructure provisioning or scaling."}
],
lab:["Create a Cloud Storage bucket and upload a sample CSV dataset (e.g. sample sales data).","Create a BigQuery dataset and load the CSV as a new table.","Run a simple SQL query in BigQuery (e.g. SUM or COUNT by category).","Note how long the query took and compare mentally to running the same aggregation manually in Excel."]},

{week:"Week 4 · DevOps & Containers", eyebrow:"Day 22", title:"Docker Fundamentals",
overview:"A deeper Docker session than the 15-day track, focused on writing efficient, production-quality Dockerfiles rather than just getting a container running.",
topics:[
 {t:"Images, layers, and the daemon", d:"Each Dockerfile instruction creates a cached layer; the Docker daemon is the background process that builds, runs, and manages containers and images on the host."},
 {t:"Writing an efficient Dockerfile", d:"Order instructions from least-to-most frequently changing (e.g. install dependencies before copying source code) so Docker's layer cache speeds up rebuilds; use multi-stage builds to keep final images small."},
 {t:"Docker Hub workflow", d:"docker login, docker tag, and docker push let you publish images publicly or privately, enabling teams (or CI/CD pipelines) to pull consistent, versioned images."},
 {t:"Volumes and networking", d:"Volumes persist data outside a container's lifecycle (so data survives container removal); Docker networks let multiple containers communicate with each other by name, not just by IP."}
],
terms:[
 {term:"Layer caching", def:"Docker's optimization that reuses unchanged image layers across builds to speed up rebuild time."},
 {term:"Multi-stage build", def:"A Dockerfile technique using multiple FROM stages to keep the final image small by discarding build-only dependencies."},
 {term:"Volume", def:"A persistent storage mechanism in Docker that exists independently of any single container's lifecycle."},
 {term:"Docker network", def:"A virtual network allowing containers to communicate with each other, often by container name."}
],
lab:["Write a multi-stage Dockerfile for a web app: one stage to build/install dependencies, a second minimal stage to run it.","Build the image and check its size (docker images) compared to a naive single-stage version.","Create a named Docker volume and mount it into the container for persistent data.","Push the final image to Docker Hub with a version tag (e.g. myapp:1.0)."]},

{week:"Week 4 · DevOps & Containers", eyebrow:"Day 23", title:"Docker Compose Lab",
overview:"Real applications are rarely a single container — Docker Compose lets you define and run multi-container applications (e.g. app + database) as a single, reproducible unit.",
topics:[
 {t:"docker-compose.yml structure", d:"A YAML file defining services (containers), each with an image or build context, ports, environment variables, and dependencies — one file describes your entire local application stack."},
 {t:"Multi-container example", d:"A typical setup pairs a web app service with a database service (e.g. Postgres or MySQL), connected automatically over a shared Compose network using service names as hostnames."},
 {t:"Environment variables and secrets", d:"Compose supports .env files and environment blocks for configuration, keeping credentials out of the image itself — a basic but important security practice."},
 {t:"Scaling services locally", d:"docker-compose up --scale <service>=3 runs multiple instances of a service locally, useful for testing load-balancing behavior before deploying to a real orchestrator."}
],
terms:[
 {term:"docker-compose.yml", def:"A YAML configuration file defining a multi-container application's services, networks, and volumes."},
 {term:"Service", def:"In Compose, a single containerized component of a larger application (e.g. 'web' or 'db')."},
 {term:".env file", def:"A file storing environment variables referenced by docker-compose.yml, kept out of version control."},
 {term:"Compose network", def:"An automatically created virtual network letting Compose services reach each other by name."}
],
lab:["Write a docker-compose.yml with two services: 'web' (your app) and 'db' (Postgres or MySQL).","Use environment variables in an .env file for database credentials.","Run docker-compose up and confirm the web service can connect to the db service using its service name as hostname.","Test docker-compose down and up again, confirming data persists if you used a named volume for the database."]},

{week:"Week 4 · DevOps & Containers", eyebrow:"Day 24", title:"Kubernetes Architecture",
overview:"A structural deep-dive into how Kubernetes clusters are actually organized, going beyond 'pods run containers' into the specific components that make orchestration possible.",
topics:[
 {t:"Control plane vs worker nodes", d:"The Control Plane (API server, scheduler, controller manager, etcd) makes all cluster decisions; Worker Nodes run the actual Pods and report status back to the control plane via the kubelet agent."},
 {t:"Pods, ReplicaSets, Deployments", d:"A Pod wraps one or more containers; a ReplicaSet ensures a specified number of identical Pods are always running; a Deployment manages ReplicaSets and adds rolling update/rollback capability on top."},
 {t:"Services — ClusterIP, NodePort, LoadBalancer", d:"ClusterIP exposes a service only within the cluster; NodePort exposes it on a static port on every node; LoadBalancer provisions an external cloud load balancer — each suits a different exposure need."},
 {t:"ConfigMaps and Secrets", d:"ConfigMaps store non-sensitive configuration data separately from container images; Secrets store sensitive data (base64-encoded, not encrypted by default) like API keys or passwords, both injectable as environment variables or files."}
],
terms:[
 {term:"etcd", def:"A distributed key-value store that holds all cluster state data for Kubernetes."},
 {term:"kubelet", def:"The agent running on each worker node that communicates with the control plane and manages Pods."},
 {term:"ReplicaSet", def:"A Kubernetes controller ensuring a specified number of identical Pod replicas are running."},
 {term:"ConfigMap", def:"A Kubernetes object storing non-sensitive configuration data separately from application code."}
],
lab:["Diagram the full request path: external user → LoadBalancer Service → Pod, labeling every component involved (control plane, kubelet, etc.).","Write a ConfigMap YAML with 2 sample configuration key-value pairs.","Write a Secret YAML with 1 sample credential (base64-encode the value first).","Explain in 2-3 sentences why Secrets being base64-encoded (not truly encrypted) matters for security."]},

{week:"Week 4 · DevOps & Containers", eyebrow:"Day 25", title:"Kubernetes Hands-On",
overview:"Today moves from diagrams to a working local cluster — deploying, scaling, and updating a real containerized application using kubectl.",
topics:[
 {t:"Installing Minikube and kubectl", d:"Minikube runs a single-node Kubernetes cluster locally (in a VM or container), letting you practice real kubectl commands without needing a cloud-managed cluster."},
 {t:"Writing Deployment and Service YAML", d:"A Deployment YAML specifies the container image, replica count, and resource limits; a Service YAML specifies how to expose those Pods, either internally or externally."},
 {t:"Scaling replicas", d:"kubectl scale deployment <name> --replicas=5 changes the number of running Pods instantly, demonstrating Kubernetes' core self-healing and scaling behavior."},
 {t:"Rolling updates and rollbacks", d:"kubectl set image triggers a rolling update, replacing Pods gradually with zero downtime; kubectl rollout undo reverts to the previous version if something breaks."}
],
terms:[
 {term:"Rolling update", def:"A deployment strategy that gradually replaces old Pods with new ones, avoiding downtime."},
 {term:"Rollback", def:"Reverting a Deployment to its previous working version after a failed update."},
 {term:"kubectl scale", def:"A command to change the number of running replicas for a Deployment."},
 {term:"minikube", def:"A tool that runs a single-node Kubernetes cluster locally for development and learning."}
],
lab:["Start Minikube and deploy your Day 22 Docker image using a Deployment YAML with 2 replicas.","Expose it via a NodePort Service and access it using minikube service.","Scale the deployment to 4 replicas and confirm with kubectl get pods.","Update the image tag to a new version and run a rolling update, then intentionally roll it back using kubectl rollout undo."]},

{week:"Week 4 · DevOps & Containers", eyebrow:"Day 26", title:"CI/CD Pipelines",
overview:"Automating the build-test-deploy cycle is what makes frequent, reliable releases possible. Today introduces CI/CD concepts and builds a working GitHub Actions pipeline.",
topics:[
 {t:"CI/CD core concepts", d:"Continuous Integration automatically builds and tests code on every commit; Continuous Deployment (or Delivery) automatically ships passing changes toward production, reducing manual release overhead and human error."},
 {t:"GitHub Actions basics", d:"Workflows are defined in YAML under .github/workflows/, triggered by events (push, pull_request), and composed of jobs and steps that run in a hosted or self-hosted runner."},
 {t:"Jenkins as an alternative", d:"Jenkins is a self-hosted, highly extensible CI/CD server — more setup overhead than GitHub Actions but offers deep customization, common in larger or on-prem-heavy organizations."},
 {t:"Automated cloud deployment", d:"A typical pipeline builds a Docker image, pushes it to a registry, then triggers a deployment update (e.g. to ECS, Kubernetes, or an EC2 instance) — all without manual intervention after the initial commit."}
],
terms:[
 {term:"CI (Continuous Integration)", def:"Automatically building and testing code changes as soon as they're committed."},
 {term:"CD (Continuous Deployment)", def:"Automatically releasing passing code changes toward production without manual steps."},
 {term:"Workflow (GitHub Actions)", def:"A YAML-defined automated process triggered by repository events like pushes or pull requests."},
 {term:"Runner", def:"The machine (hosted or self-hosted) that executes the steps in a CI/CD pipeline."}
],

let currentPlan = 15;
let activeIndex = 0;
let doneState = {15:{}, 30:{}};

function setPlan(plan){
  currentPlan = plan;
  activeIndex = 0;
  document.getElementById('btn15').classList.toggle('active', plan===15);
  document.getElementById('btn30').classList.toggle('active', plan===30);
  document.getElementById('progressLabel').textContent = plan===15 ? "DAYS COMPLETE · 15-DAY TRACK" : "DAYS COMPLETE · 30-DAY TRACK";
  renderDayList();
  renderContent();
  updateProgress();
}

function toggleDone(i, evt){
  if(evt) evt.stopPropagation();
  doneState[currentPlan][i] = !doneState[currentPlan][i];
  renderDayList();
  renderContent();
  updateProgress();
}

function selectDay(i){
  activeIndex = i;
  renderDayList();
  renderContent();
}

function renderDayList(){
  const days = DATA[currentPlan];
  const list = document.getElementById('dayList');
  let html = "";
  let lastWeek = "";
  days.forEach((d, i) => {
    if(d.week !== lastWeek){
      html += `<div class="week-label">${d.week}</div>`;
      lastWeek = d.week;
    }
    const isActive = i === activeIndex ? "active" : "";
    const isDone = doneState[currentPlan][i] ? "done" : "";
    html += `
      <div class="day-item ${isActive}" onclick="selectDay(${i})">
        <div class="check ${isDone}" onclick="toggleDone(${i}, event)"></div>
        <span class="day-num">${d.eyebrow.replace('Day ','')}</span>
        <span class="day-title-mini">${d.title}</span>
      </div>`;
  });
  list.innerHTML = html;
}

function renderContent(){
  const d = DATA[currentPlan][activeIndex];
  const isDone = !!doneState[currentPlan][activeIndex];
  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="content-head">
      <div>
        <div class="content-eyebrow">${d.eyebrow} · ${d.week}</div>
        <div class="content-title">${d.title}</div>
      </div>
      <button class="mark-btn ${isDone ? 'is-done' : ''}" onclick="toggleDone(${activeIndex})">
        ${isDone ? '✓ Completed' : 'Mark Complete'}
      </button>
    </div>

    <div class="overview">${d.overview}</div>

    <div class="section-label">Topics Covered</div>
    ${d.topics.map(t => `
      <div class="topic-block">
        <div class="t-title">${t.t}</div>
        <div class="t-detail">${t.d}</div>
      </div>
    `).join('')}

    <div class="section-label">Key Terms</div>
    <div class="terms-grid">
      ${d.terms.map(x => `
        <div class="term-card">
          <div class="term">${x.term}</div>
          <div class="def">${x.def}</div>
        </div>
      `).join('')}
    </div>

    <div class="section-label">Hands-On Lab</div>
    <div class="lab-box">
      <b>Do this →</b>
      <ol class="lab-steps">
        ${d.lab.map(step => `<li>${step}</li>`).join('')}
      </ol>
    </div>

    <div class="nav-row">
      <button class="nav-btn" onclick="prevDay()" ${activeIndex===0?'disabled':''}>← Previous Day</button>
      <button class="nav-btn" onclick="nextDay()" ${activeIndex===DATA[currentPlan].length-1?'disabled':''}>Next Day →</button>
    </div>
  `;
}

function prevDay(){ if(activeIndex>0){ activeIndex--; renderDayList(); renderContent(); } }
function nextDay(){ if(activeIndex<DATA[currentPlan].length-1){ activeIndex++; renderDayList(); renderContent(); } }

function updateProgress(){
  const total = DATA[currentPlan].length;
  const done = Object.values(doneState[currentPlan]).filter(Boolean).length;
  const pct = Math.round((done/total)*100);
  document.getElementById('progressFill').style.width = pct + "%";
  document.getElementById('progressPct').textContent = pct + "%";
}

setPlan(15);
</script>
