<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Notes - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-forgot input[type="checkbox"] {
            margin-right: 5px;
            cursor: pointer;
        }

        .remember-forgot a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .remember-forgot a:hover {
            color: #764ba2;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 15px;
            padding: 10px;
            background-color: #fadbd8;
            border-left: 4px solid #e74c3c;
            border-radius: 3px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 13px;
            margin-top: 15px;
            padding: 10px;
            background-color: #d5f4e6;
            border-left: 4px solid #27ae60;
            border-radius: 3px;
            display: none;
        }

        .notes-links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            text-align: center;
        }

        .notes-links h3 {
            color: #333;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .note-link {
            display: inline-block;
            padding: 10px;
            background-color: #f5f5f5;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            font-size: 12px;
            transition: background-color 0.3s;
        }

        .note-link:hover {
            background-color: #e8eaf6;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 15px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>📚 Class Notes</h1>
            <p>Access your study materials</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    placeholder="Enter your username"
                    required
                >
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                >
            </div>

            <div class="remember-forgot">
                <label style="display: flex; align-items: center; margin: 0;">
                    <input type="checkbox" id="remember" name="remember">
                    Remember me
                </label>
                <a href="#" onclick="alert('Password reset feature coming soon!'); return false;">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>

            <div class="loading" id="loading">
                <span class="spinner"></span>Verifying credentials...
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
        </form>

        <div class="notes-links">
            <h3>📖 Quick Access to Notes</h3>
            <div class="notes-grid">
                <a href="python_notes_1.html" class="note-link" onclick="return loginFirst(event)">Python Notes</a>
                <a href="django_20day_notes.html" class="note-link" onclick="return loginFirst(event)">Django Notes</a>
                <a href="sql_20day_notes.html" class="note-link" onclick="return loginFirst(event)">SQL Notes</a>
                <a href="powerbi_28day_notes.html" class="note-link" onclick="return loginFirst(event)">Power BI Notes</a>
                <a href="cloud_computing_curriculum%201.html" class="note-link" onclick="return loginFirst(event)">Cloud Computing</a>
                <a href="html-css-selenium-notes.html" class="note-link" onclick="return loginFirst(event)">HTML/CSS/Selenium</a>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const loadingDiv = document.getElementById('loading');
        const rememberCheckbox = document.getElementById('remember');

        // Load saved username if "Remember me" was checked before
        window.addEventListener('load', () => {
            const savedUsername = localStorage.getItem('savedUsername');
            if (savedUsername) {
                usernameInput.value = savedUsername;
                rememberCheckbox.checked = true;
            }
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            clearMessages();
            loadingDiv.style.display = 'block';

            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            try {
                // Fetch the users.json file
                const response = await fetch('users.json');
                
                if (!response.ok) {
                    throw new Error('Unable to load user database');
                }

                const usersData = await response.json();

                // Check if user exists and password matches
                const user = usersData.users.find(u => u.username === username);

                if (!user) {
                    throw new Error('User not found');
                }

                if (user.password !== password) {
                    throw new Error('Incorrect password');
                }

                // Success - Save username if Remember me is checked
                if (rememberCheckbox.checked) {
                    localStorage.setItem('savedUsername', username);
                } else {
                    localStorage.removeItem('savedUsername');
                }

                // Show success message and redirect
                successMessage.textContent = `Welcome back, ${user.name}! 🎉`;
                successMessage.style.display = 'block';

                // Set session flag
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('currentUser', username);

                // Redirect after 1.5 seconds
                setTimeout(() => {
                    // Redirect to a dashboard or notes page
                    alert(`Login successful! You are now logged in as ${user.name}.`);
                    // window.location.href = 'dashboard.html'; // You can create a dashboard page
                }, 1500);

            } catch (error) {
                errorMessage.textContent = `❌ ${error.message}`;
                errorMessage.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        function clearMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
            errorMessage.textContent = '';
            successMessage.textContent = '';
        }

        function loginFirst(event) {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            if (!isLoggedIn) {
                event.preventDefault();
                alert('Please login first to access the notes!');
                return false;
            }
            return true;
        }
    </script>
</body>
</html>
